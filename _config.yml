title: Manila Sun
description: "Manila Sun explores Filipino food and culture, from classic dishes like tocino, sisig, and pancit to the history and traditions behind them."
url: "https://manilasun.com"
baseurl: ""

permalink: /:title/

markdown: kramdown

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"
